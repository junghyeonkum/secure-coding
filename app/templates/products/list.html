{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-3">
  <h1 class="h3 mb-0">상품 목록</h1>
  {% if current_user.is_authenticated %}<a class="btn btn-primary align-self-md-start" href="{{ url_for('products.create') }}">상품 등록</a>{% endif %}
</div>
<form method="get" class="bg-white border rounded-3 p-3 mb-4">
  <div class="row g-2 align-items-end">
    <div class="col-12 col-md-5">
      <label class="form-label" for="q">검색</label>
      <input id="q" class="form-control" name="q" value="{{ q }}" placeholder="상품명을 입력하세요">
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label" for="category">카테고리</label>
      <select id="category" class="form-select" name="category">
        <option value="">전체 카테고리</option>
        {% for c in categories %}<option value="{{ c }}" {% if c == category %}selected{% endif %}>{{ c }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label d-block">정렬</label>
      <div class="btn-group w-100 sort-group" role="group">
        <button class="btn btn-outline-primary {% if sort == 'latest' %}active{% endif %}" name="sort" value="latest">최신순</button>
        <button class="btn btn-outline-primary {% if sort in ['price_asc', 'price_desc'] %}active{% endif %}" name="sort" value="price_asc">가격순</button>
        <button class="btn btn-outline-primary {% if sort == 'views' %}active{% endif %}" name="sort" value="views">조회순</button>
      </div>
    </div>
  </div>
</form>
{% include "products/_grid.html" %}
{% endblock %}
