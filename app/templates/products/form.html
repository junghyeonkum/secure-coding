{% extends "base.html" %}
{% block content %}
<div class="bg-white border rounded-3 p-3 p-md-4">
<h1 class="h3 mb-3">{{ title }}</h1>
<form method="post" enctype="multipart/form-data" class="vstack gap-3">
  {{ form.hidden_tag() }}
  <label class="form-label">{{ form.product_name.label }} {{ form.product_name(class_="form-control") }}</label>
  <label class="form-label">{{ form.category.label }} {{ form.category(class_="form-select") }}</label>
  <label class="form-label">{{ form.price.label }} {{ form.price(class_="form-control") }}</label>
  <label class="form-label">{{ form.description.label }} {{ form.description(rows=6, class_="form-control") }}</label>
  <label class="form-label">{{ form.image.label }} {{ form.image(class_="form-control") }}</label>
  <button class="btn btn-primary align-self-start" type="submit">저장</button>
</form>
</div>
{% endblock %}
