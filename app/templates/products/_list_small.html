<ul class="list-group list-group-flush">
  {% for product in products %}
    <li class="list-group-item px-0 d-flex justify-content-between gap-2">
      <a href="{{ url_for('products.detail', product_id=product.product_id) }}">{{ product.product_name }}</a>
      <span class="text-secondary">{{ "{:,}".format(product.price) }}원</span>
    </li>
  {% else %}
    <li class="list-group-item px-0 text-secondary">상품이 없습니다.</li>
  {% endfor %}
</ul>
